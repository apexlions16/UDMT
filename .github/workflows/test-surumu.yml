name: Windows test sürümünü oluştur ve yayımla

on:
  push:
    branches:
      - main
    paths:
      - 'src/UDMT.TestSurumu/**'
      - 'README.md'
      - 'YOL_HARITASI.md'
      - 'SÜRÜM_NOTLARI.md'
      - '.github/workflows/test-surumu.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/UDMT.TestSurumu/**'
      - 'README.md'
      - 'YOL_HARITASI.md'
      - 'SÜRÜM_NOTLARI.md'
      - '.github/workflows/test-surumu.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  SURUM: 0.3.0-beta.1
  ETIKET: v0.3.0-beta.1

jobs:
  derle-ve-yayinla:
    name: Windows x64 paketini derle ve yayımla
    runs-on: windows-latest

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: .NET 9 SDK kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Projeyi geri yükle
        run: dotnet restore src/UDMT.TestSurumu/UDMT.TestSurumu.csproj

      - name: Tek dosyalı Windows uygulamasını yayımla
        run: >-
          dotnet publish src/UDMT.TestSurumu/UDMT.TestSurumu.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -p:DebugType=None
          -p:DebugSymbols=false
          -o yayin/UDMT

      - name: Yayın çıktısını doğrula
        shell: pwsh
        run: |
          if (-not (Test-Path 'yayin/UDMT/UDMT.exe')) {
            throw 'UDMT.exe üretilemedi.'
          }
          Copy-Item 'SÜRÜM_NOTLARI.md' 'yayin/UDMT/SÜRÜM_NOTLARI.md'
          Copy-Item 'YOL_HARITASI.md' 'yayin/UDMT/YOL_HARITASI.md'
          @"
          UDMT v0.3.0-beta.1

          Bu paket format merkezli geliştirme yönü ve tema sistemi test sürümüdür.
          Ayrıntılar için SÜRÜM_NOTLARI.md ve YOL_HARITASI.md dosyalarını okuyun.
          "@ | Set-Content -Path 'yayin/UDMT/OKU_BENI.txt' -Encoding UTF8

      - name: ZIP paketini oluştur
        shell: pwsh
        run: Compress-Archive -Path 'yayin/UDMT/*' -DestinationPath "UDMT-v${env:SURUM}-win-x64.zip" -Force

      - name: İş akışı çıktısını sakla
        uses: actions/upload-artifact@v4
        with:
          name: UDMT-v${{ env.SURUM }}-win-x64
          path: UDMT-v${{ env.SURUM }}-win-x64.zip
          if-no-files-found: error

      - name: GitHub test sürümünü yayımla
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $paket = "UDMT-v${env:SURUM}-win-x64.zip"
          gh release view $env:ETIKET *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:ETIKET $paket --clobber
            gh release edit $env:ETIKET --title "UDMT v${env:SURUM}" --notes-file 'SÜRÜM_NOTLARI.md' --prerelease
          }
          else {
            gh release create $env:ETIKET $paket --target $env:GITHUB_SHA --title "UDMT v${env:SURUM}" --notes-file 'SÜRÜM_NOTLARI.md' --prerelease
          }

      - name: Yayının tamamlandığını issue üzerinde bildir
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 1 --body "✅ **UDMT v${env:SURUM} test sürümü yayımlandı.** Format seçim ekranı ve açık/koyu tema sistemi Windows x64 paketi olarak derlendi ve doğrulandı. Kaynak commit: ``${env:GITHUB_SHA}``."
